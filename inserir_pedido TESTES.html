<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Pedidos</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
  h2 { color: #333; }
  .info { font-size: 13px; color: #888; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  th { background: #2c3e50; color: white; padding: 12px 10px; text-align: left; font-size: 13px; }
  td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9f9f9; }

  /* Status badges */
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
  .pendente   { background: #fff3cd; color: #856404; }
  .produzindo { background: #cce5ff; color: #004085; }
  .concluido  { background: #d4edda; color: #155724; }

  /* Dias restantes */
  .atrasado   { color: #dc3545; font-weight: bold; }
  .urgente    { color: #fd7e14; font-weight: bold; }
  .ok         { color: #28a745; font-weight: bold; }
  .neutro     { color: #6c757d; }

  .loading { text-align: center; padding: 40px; color: #888; }
  .atualizado { font-size: 12px; color: #aaa; text-align: right; margin-top: 10px; }

  /* Linha atrasada */
  tr.linha-atrasada td { background: #fff5f5; }
</style>
</head>
<body>

<h2>📦 Painel de Pedidos</h2>
<div class="info">Atualizado automaticamente • Dias úteis calculados sem feriados nacionais</div>

<table id="tabela">
  <thead>
    <tr>
      <th>#</th>
      <th>Cliente</th>
      <th>Produto</th>
      <th>Qtd</th>
      <th>Status</th>
      <th>Início Produção</th>
      <th>Data Entrega</th>
      <th>Dias Úteis Restantes</th>
    </tr>
  </thead>
  <tbody id="corpo">
    <tr><td colspan="8" class="loading">⏳ Carregando...</td></tr>
  </tbody>
</table>

<div class="atualizado" id="atualizado"></div>

<script>
const API = 'https://api-pedidos-a65y.onrender.com/api/pedidos/view';

function formatarData(data) {
  if (!data) return '—';
  return new Date(data).toLocaleDateString('pt-BR');
}

function badgeStatus(status) {
  return `<span class="badge ${status}">${status}</span>`;
}

function diasRestantes(dias) {
  if (dias === null || dias === undefined) return '<span class="neutro">—</span>';
  if (dias < 0)  return `<span class="atrasado">⛔ ATRASADO (${Math.abs(dias)} dias)</span>`;
  if (dias === 0) return `<span class="atrasado">⛔ HOJE!</span>`;
  if (dias <= 3)  return `<span class="urgente">⚠️ ${dias} dias</span>`;
  return `<span class="ok">✅ ${dias} dias</span>`;
}

async function carregar() {
  try {
    const res = await fetch(API);
    const dados = await res.json();
    const corpo = document.getElementById('corpo');

    if (!dados.length) {
      corpo.innerHTML = '<tr><td colspan="8" class="loading">Nenhum pedido encontrado.</td></tr>';
      return;
    }

    corpo.innerHTML = dados.map(p => {
      const atrasado = p.dias_uteis_restantes < 0 ? 'linha-atrasada' : '';
      return `
        <tr class="${atrasado}">
          <td>${p.id}</td>
          <td>${p.cliente}</td>
          <td>${p.produto}</td>
          <td>${p.quantidade}</td>
          <td>${badgeStatus(p.status)}</td>
          <td>${formatarData(p.data_inicio_producao)}</td>
          <td>${formatarData(p.data_entrega)}</td>
          <td>${diasRestantes(p.dias_uteis_restantes)}</td>
        </tr>`;
    }).join('');

    document.getElementById('atualizado').textContent =
      'Última atualização: ' + new Date().toLocaleString('pt-BR');

  } catch (err) {
    document.getElementById('corpo').innerHTML =
      `<tr><td colspan="8" class="loading">⚠️ API dormindo, aguarde 30 segundos e recarregue a página...</td></tr>`;
  }
}

carregar();
// Atualiza a cada 5 minutos
setInterval(carregar, 5 * 60 * 1000);
</script>
</body>
</html>
